spring.application.name=jutjubic-backend-test

# Test PostgreSQL baza (odvojena od prave!)
spring.datasource.url=jdbc:postgresql://localhost:5432/jutjubic_test
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ? test re?im
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mail se ne koristi u testovima
spring.mail.host=localhost
spring.mail.port=1025

# JWT (isti secret je OK)
jwt.expiration=86400000
jwt.secret=jutjubic_backend_secret_key_2026_secure_token

# Redis ISKLJU?EN u testu
spring.cache.type=none

# Upload nije bitan za test
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.uploads.root=uploads-test
app.uploads.timeout-ms=5000

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
