spring.application.name=jutjubic-backend

# PostgreSQL konekcija
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jutjubic}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}


spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest



spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sabonabosana@gmail.com
spring.mail.password=ziplppakyferzpnu
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#JWT
jwt.expiration=86400000
jwt.secret=jutjubic_backend_secret_key_2026_secure_token

#limit za video
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB


app.uploads.root=uploads
app.uploads.timeout-ms=30000

# spring cache preko redisa
spring.cache.type=redis
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.timeout=2s
spring.cache.redis.cache-null-values=false

#da ne probije limit konekcija u pgAdminu
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000


spring.jackson.serialization.write-dates-as-timestamps=false

# FFmpeg
app.ffmpeg.path=ffmpeg
app.ffprobe.path=ffprobe


# Async processing
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100


#health check


management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

management.health.redis.enabled=false

mq.upload.listeners.enabled=false

#PROMETHEUS MONITORING
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true

# Hikari metrike
management.metrics.enable.hikari=true
spring.datasource.hikari.register-mbeans=true

# JVM metrike (CPU, Memory)
management.metrics.enable.jvm=true
management.metrics.enable.process=true

# System metrike
management.metrics.enable.system=true

# Prometheus port (opciono, mo?e biti na istom portu kao app)
management.server.port=8080

# Custom metrike
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Disable mail health check (jer Gmail blokira previ?e login poku?aja)
management.health.mail.enabled=false


