syntax = "proto3";

package jutjubic;

option java_package = "com.jutjubic.jutjubic_backend.messaging.proto";
option java_outer_classname = "UploadEventProto";

message UploadEvent {
  int64 videoId = 1;
  string title = 2;
  string authorEmail = 3;
  int64 sizeBytes = 4;
  string createdAt = 5; // ISO string, npr "2026-02-15T10:22:11"
}
